*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1e3a5f;--navy2:#2d5f8a;--green:#059669;--amber:#d97706;--red:#b91c1c;
  --blue:#0369a1;--border:#e2e8f0;--bg:#f8fafc;--text:#1f2937;--muted:#6b7280;
  --radius:12px;--safe-bottom:env(safe-area-inset-bottom,0px)
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:var(--text);min-height:100vh;padding-bottom:calc(72px + var(--safe-bottom));font-size:15px}
.header{background:linear-gradient(160deg,#1e3a5f 0%,#2d5f8a 100%);color:#fff;padding:52px 20px 20px}
.header-eyebrow{font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.65;margin-bottom:4px}
.header-title{font-size:22px;font-weight:700}
.header-sub{font-size:12px;opacity:.75;margin-top:2px}
.progress-wrap{margin-top:16px}
.progress-meta{display:flex;justify-content:space-between;font-size:12px;opacity:.85;margin-bottom:5px}
.progress-bar-bg{background:rgba(255,255,255,.2);border-radius:6px;height:7px}
.progress-bar{background:#4ade80;border-radius:6px;height:7px;transition:width .4s}
.today-strip{background:#162d4a;color:#fff;padding:8px 20px;font-size:12px;display:flex;justify-content:space-between}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:10px;gap:3px;transition:color .15s}
.nav-btn.active{color:var(--navy)}
.nav-icon{font-size:20px}
.main{padding:16px;max-width:600px;margin:0 auto}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:#fff;cursor:pointer;color:var(--text);transition:all .15s}
.chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.scroll-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-row::-webkit-scrollbar{display:none}
.day-chip{padding:5px 10px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);white-space:nowrap;flex-shrink:0}
.day-chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.day-chip.done{background:#d1fae5;border-color:#6ee7b7}
.day-chip.partial{background:#fef3c7;border-color:#fcd34d}
.task-item{display:flex;align-items:flex-start;gap:12px;padding:12px;background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .15s;-webkit-user-select:none;user-select:none}
.task-item.done{background:#f0fdf4;border-color:#86efac}
.task-item:active{opacity:.85}
.task-check{width:24px;height:24px;border-radius:7px;border:2px solid #d1d5db;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;transition:all .15s;font-size:13px;font-weight:700;color:#fff}
.task-check.checked{background:var(--green);border-color:var(--green)}
.task-body{flex:1;min-width:0}
.task-meta{display:flex;align-items:center;gap:8px;margin-bottom:4px;flex-wrap:wrap}
.task-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;flex-shrink:0}
.task-num{width:22px;height:22px;border-radius:50%;background:var(--navy);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.task-min{font-size:11px;color:var(--muted)}
.task-text{font-size:13px;line-height:1.45;color:var(--text)}
.task-item.done .task-text{text-decoration:line-through;color:var(--muted)}
.badge-aula{background:#ede9fe;color:#7c3aed}
.badge-leitura{background:#e0f2fe;color:#0369a1}
.badge-fichamento{background:#d1fae5;color:#065f46}
.badge-pratica{background:#fef3c7;color:#92400e}
.badge-simulado{background:#ffe4e6;color:#9f1239}
.badge-revisao{background:#f3f4f6;color:#374151}
.ordem-hint{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#0369a1;line-height:1.5}
.flex-note{margin-top:12px;padding:10px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:12px;color:#92400e;line-height:1.5}
.dia-fase{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.dia-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.dia-title{font-size:18px;font-weight:700;color:var(--navy)}
.dia-sub{font-size:12px;color:var(--muted);margin-top:2px}
.dia-pct{font-size:26px;font-weight:700;text-align:right}
.dia-pct-lbl{font-size:10px;color:var(--muted);text-align:right}
.tema-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.tema-pill{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.week-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.week-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.week-label{font-size:14px;font-weight:700;color:var(--navy)}
.week-sub{font-size:11px;color:var(--muted);margin-top:1px}
.week-pct{font-size:16px;font-weight:700}
.bar{background:#e5e7eb;border-radius:5px;height:6px;margin-bottom:10px}
.bar-fill{border-radius:5px;height:6px;transition:width .4s}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.metric-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.metric-val{font-size:20px;font-weight:700}
.metric-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.status-pill{padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:12px}
.interp{padding:10px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;font-size:12px;color:#1e3a5f;line-height:1.55}
.tema-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.tema-pct-badge{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.tema-label{font-size:13px;font-weight:600;color:var(--text);flex:1;min-width:0;line-height:1.3}
.tema-nivel{font-size:10px;font-weight:700;flex-shrink:0}
.tema-bar-wrap{height:4px;background:#e5e7eb;border-radius:4px;margin-top:5px}
.tema-bar{height:4px;border-radius:4px}
.section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.install-card{background:var(--navy);color:#fff;border-radius:var(--radius);padding:14px 16px;margin-bottom:12px}
.install-card h3{font-size:13px;font-weight:700;margin-bottom:6px}

// ─── ESTADO ──────────────────────────────────────────────────────────────────
var STORAGE_KEY = "dipr_v4";
var progresso = {};
var diaAtivo = 1;
var semAtiva = 1;
var tabAtiva = "roteiro";
var semRel = 1;

function loadProg() {
  var raw = storage.get(STORAGE_KEY);
  if (raw) {
    try { return JSON.parse(raw); } catch(e) {}
  }
  var init = {};
  for (var i = 0; i < ROTEIRO.length; i++) {
    var d = ROTEIRO[i];
    init[d.id] = [];
    for (var j = 0; j < d.tarefas.length; j++) init[d.id].push(false);
  }
  return init;
}

function saveProg() {
  try { storage.set(STORAGE_KEY, JSON.stringify(progresso)); } catch(e) {}
}

function getDia(id) {
  for (var i = 0; i < ROTEIRO.length; i++) { if (ROTEIRO[i].id === id) return ROTEIRO[i]; }
  return ROTEIRO[0];
}

function getPctDia(dia) {
  var arr = progresso[dia.id] || [];
  var f = 0;
  for (var i = 0; i < arr.length; i++) { if (arr[i]) f++; }
  return dia.tarefas.length ? Math.round((f / dia.tarefas.length) * 100) : 0;
}

function getStatusDia(dia) {
  var p = getPctDia(dia);
  if (p === 0) return "pendente";
  if (p === 100) return "done";
  return "partial";
}

function getPctSem(s) {
  var total = 0, feitos = 0;
  for (var i = 0; i < ROTEIRO.length; i++) {
    var d = ROTEIRO[i];
    if (d.sem !== s) continue;
    total += d.tarefas.length;
    var arr = progresso[d.id] || [];
    for (var j = 0; j < arr.length; j++) { if (arr[j]) feitos++; }
  }
  return total ? Math.round((feitos / total) * 100) : 0;
}

function getTotalGeral() {
  var total = 0, feitos = 0;
  for (var i = 0; i < ROTEIRO.length; i++) {
    var d = ROTEIRO[i];
    total += d.tarefas.length;
    var arr = progresso[d.id] || [];
    for (var j = 0; j < arr.length; j++) { if (arr[j]) feitos++; }
  }
  var pct = total ? Math.round((feitos / total) * 100) : 0;
  return {total: total, feitos: feitos, pct: pct};
}

function getDiasSem(s) {
  var out = [];
  for (var i = 0; i < ROTEIRO.length; i++) { if (ROTEIRO[i].sem === s) out.push(ROTEIRO[i]); }
  return out;
}

// ─── INICIALIZAÇÃO ───────────────────────────────────────────────────────────
progresso = loadProg();

var hoje = new Date();
var inicio = new Date("2026-06-22");
var diff = Math.floor((hoje - inicio) / 86400000);
diaAtivo = Math.max(1, Math.min(diff + 1, 41));
var diaIni = getDia(diaAtivo);
semAtiva = diaIni ? diaIni.sem : 1;
semRel = semAtiva;

// ─── HEADER ──────────────────────────────────────────────────────────────────
function updateHeader() {
  var g = getTotalGeral();
  document.getElementById("hdr-feitos").textContent = g.feitos + "/" + g.total + " tarefas";
  document.getElementById("hdr-pct").textContent = g.pct + "%";
  document.getElementById("hdr-bar").style.width = g.pct + "%";
  var dh = getDia(diaAtivo);
  document.getElementById("today-strip").textContent = "Dia ativo: " + dh.data + "  |  " + dh.fase;
}

// ─── RENDERIZADORES ──────────────────────────────────────────────────────────
function renderRoteiro() {
  var dias = getDiasSem(semAtiva);
  var diaObj = getDia(diaAtivo);
  var pctDia = getPctDia(diaObj);

  var html = '<div class="install-card"><h3>📱 Instalar no iPhone</h3><p>Safari: toque em Compartilhar (quadrado c/ seta) &rarr; "Adicionar a Tela de Inicio"</p></div>';

  // chips semanas
  html += '<div class="chip-row">';
  for (var s = 1; s <= 6; s++) {
    var ativa = (diaObj.sem === s);
    html += '<button class="chip' + (ativa ? ' active' : '') + '" onclick="setSem(' + s + ')">' + s + 'a sem. (' + getPctSem(s) + '%)</button>';
  }
  html += '</div>';

  // scroll dias
  html += '<div class="scroll-row" style="margin-bottom:14px">';
  for (var i = 0; i < dias.length; i++) {
    var d = dias[i];
    var st = getStatusDia(d);
    var ativo = (d.id === diaAtivo);
    var cls = ativo ? 'day-chip active' : (st === 'done' ? 'day-chip done' : (st === 'partial' ? 'day-chip partial' : 'day-chip'));
    var icon = st === 'done' ? ' ✓' : (st === 'partial' ? ' ' + getPctDia(d) + '%' : '');
    html += '<button class="' + cls + '" onclick="setDia(' + d.id + ')">' + d.data.split(' ')[0] + icon + '</button>';
  }
  html += '</div>';

  // card do dia
  var corPct = pctDia === 100 ? '#059669' : '#1e3a5f';
  html += '<div class="card">';
  html += '<div class="dia-fase">' + diaObj.fase + '</div>';
  html += '<div class="dia-header"><div>';
  html += '<div class="dia-title">' + diaObj.data + '</div>';
  html += '<div class="dia-sub">' + (diaObj.tipo === 'fds' ? '🗓 Fim de semana · ~6h' : '💼 Dia util · ~3h') + '</div>';
  html += '</div><div>';
  html += '<div class="dia-pct" style="color:' + corPct + '">' + pctDia + '%</div>';
  html += '<div class="dia-pct-lbl">concluido</div>';
  html += '</div></div>';

  // pills de temas
  if (diaObj.temas.length > 0) {
    html += '<div class="tema-pills">';
    for (var t = 0; t < diaObj.temas.length; t++) {
      var tema = TEMAS[diaObj.temas[t]];
      if (tema) html += '<span class="tema-pill">' + tema.prob + '% prob.</span>';
    }
    html += '</div>';
  }

  // hint de ordem
  html += '<div class="ordem-hint">📋 <strong>Ordem do dia:</strong> siga os numeros — sempre faca as tarefas na sequencia indicada para melhor absorcao.</div>';

  // tarefas
  for (var j = 0; j < diaObj.tarefas.length; j++) {
    var tar = diaObj.tarefas[j];
    var feito = (progresso[diaObj.id] && progresso[diaObj.id][j]) ? true : false;
    var tc = TIPO[tar.tipo] || TIPO.revisao;
    html += '<div class="task-item' + (feito ? ' done' : '') + '" onclick="toggleTask(' + diaObj.id + ',' + j + ')">';
    html += '<div class="task-num">' + tar.o + '</div>';
    html += '<div class="task-body">';
    html += '<div class="task-meta"><span class="task-badge ' + tc.cls + '">' + tc.label + '</span><span class="task-min">' + tar.min + ' min</span></div>';
    html += '<div class="task-text">' + tar.t + '</div>';
    html += '</div>';
    html += '<div class="task-check' + (feito ? ' checked' : '') + '">' + (feito ? '✓' : '') + '</div>';
    html += '</div>';
  }

  html += '<div class="flex-note">💡 <strong>Flexibilidade:</strong> Se nao conseguir tudo, priorize Aula e Leitura. Fichamento e Revisao podem migrar para o dia seguinte.</div>';
  html += '</div>';

  document.getElementById("main-content").innerHTML = html;
  updateHeader();
}

function renderSemanas() {
  var html = '';
  for (var s = 1; s <= 6; s++) {
    var dias = getDiasSem(s);
    var pctS = getPctSem(s);
    var barCor = pctS === 100 ? '#059669' : '#2d5f8a';
    var corPct = pctS === 100 ? '#059669' : (pctS > 0 ? '#d97706' : '#9ca3af');
    html += '<div class="week-card">';
    html += '<div class="week-header"><div><div class="week-label">Semana ' + s + '</div>';
    html += '<div class="week-sub">' + (dias[0] ? dias[0].fase : '') + '</div></div>';
    html += '<div class="week-pct" style="color:' + corPct + '">' + pctS + '%</div></div>';
    html += '<div class="bar"><div class="bar-fill" style="background:' + barCor + ';width:' + pctS + '%"></div></div>';
    html += '<div class="scroll-row">';
    for (var i = 0; i < dias.length; i++) {
      var d = dias[i];
      var st = getStatusDia(d);
      var cls = st === 'done' ? 'day-chip done' : (st === 'partial' ? 'day-chip partial' : 'day-chip');
      var icon = st === 'done' ? ' ✓' : '';
      html += '<button class="' + cls + '" onclick="goToDay(' + d.id + ')">' + d.data.split(' ')[0] + icon + '</button>';
    }
    html += '</div></div>';
  }
  document.getElementById("main-content").innerHTML = html;
}

function renderRelatorio() {
  var dias = getDiasSem(semRel);
  var pctS = getPctSem(semRel);
  var totalT = 0, feitosT = 0, diasConc = 0;
  var temasSet = {};
  for (var i = 0; i < dias.length; i++) {
    var d = dias[i];
    totalT += d.tarefas.length;
    var arr = progresso[d.id] || [];
    for (var j = 0; j < arr.length; j++) { if (arr[j]) feitosT++; }
    if (getPctDia(d) === 100) diasConc++;
    for (var t = 0; t < d.temas.length; t++) temasSet[d.temas[t]] = true;
  }

  var statusGeral = "🔴 Precisa de atencao"; var stCor = "#b91c1c";

  else if (pctS >= 50) { statusGeral = "🟡 Bom progresso"; stCor = "#d97706"; }
  else if (pctS >= 30) { statusGeral = "🟠 Progresso moderado"; stCor = "#ea580c"; }

  var interp = "";
  if (pctS === 0) interp = "Semana ainda nao iniciada. Priorize Simulados e Leituras de Alta Prioridade.";

  else if (pctS < 100) interp = "Otimo progresso (" + pctS + "%). Revise rapidamente os itens pendentes antes de avancar.";
  else interp = "Semana 100% completa! Excelente disciplina. Verifique se internalizou os conceitos-chave.";

  var html = '<div class="chip-row">';
  for (var s = 1; s <= 6; s++) {
    html += '<button class="chip' + (semRel === s ? ' active' : '') + '" onclick="setSemRel(' + s + ')">Sem. ' + s + '</button>';
  }
  html += '</div><div class="card">';
  html += '<div style="font-size:14px;font-weight:700;color:#1e3a5f;margin-bottom:12px">Semana ' + semRel + ' — ' + (dias[0] ? dias[0].fase : '') + '</div>';

  html += '<div class="metric-grid">';
  html += '<div class="metric-card"><div class="metric-val" style="color:' + stCor + '">' + pctS + '%</div><div class="metric-lbl">Conclusao</div></div>';
  html += '<div class="metric-card"><div class="metric-val" style="color:#1e3a5f">' + feitosT + '/' + totalT + '</div><div class="metric-lbl">Tarefas</div></div>';
  html += '<div class="metric-card"><div class="metric-val" style="color:#059669">' + diasConc + '/' + dias.length + '</div><div class="metric-lbl">Dias completos</div></div>';
  html += '</div>';

  html += '<div class="status-pill" style="background:' + stCor + '18;color:' + stCor + ';border:1px solid ' + stCor + '40">' + statusGeral + '</div>';

  html += '<div class="section-title">Dias da semana</div>';
  for (var k = 0; k < dias.length; k++) {
    var dd = dias[k];
    var p = getPctDia(dd);
    var barC = p === 100 ? '#059669' : (p > 0 ? '#d97706' : '#e5e7eb');
    html += '<div style="display:flex;align-items:center;gap:10px;margin-bottom:7px">';
    html += '<div style="font-size:12px;color:#6b7280;width:92px;flex-shrink:0">' + dd.data + '</div>';
    html += '<div style="flex:1;background:#e5e7eb;border-radius:5px;height:7px"><div style="background:' + barC + ';border-radius:5px;height:7px;width:' + p + '%"></div></div>';
    html += '<div style="font-size:12px;font-weight:600;color:' + (p === 100 ? '#059669' : '#374151') + ';width:34px;text-align:right">' + p + '%</div></div>';
  }

  html += '<div class="section-title" style="margin-top:12px">Temas cobertos</div>';
  var tKeys = Object.keys(temasSet);
  for (var m = 0; m < tKeys.length; m++) {
    var tema = TEMAS[tKeys[m]];
    if (!tema) continue;
    html += '<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 10px;background:#f8fafc;border:1px solid var(--border);border-radius:8px;margin-bottom:6px">';
    html += '<span style="font-size:12px;flex:1;min-width:0;margin-right:8px;line-height:1.3">' + tema.label + '</span>';
    html += '<span style="font-size:11px;font-weight:700;color:' + tema.cor + '">' + tema.prob + '%</span></div>';
  }

  html += '<div class="interp" style="margin-top:12px"><strong>Interpretacao:</strong> ' + interp + '</div></div>';
  document.getElementById("main-content").innerHTML = html;
}

function renderTemas() {
  var html = '<p style="font-size:12px;color:#6b7280;margin-bottom:14px;line-height:1.55">Probabilidade baseada em 4 edicoes de provas (2022-2025), espelhos de correcao e padrao bibliografico.</p>';
  var keys = Object.keys(TEMAS);
  for (var i = 0; i < keys.length; i++) {
    var t = TEMAS[keys[i]];
    html += '<div class="tema-row">';
    html += '<div class="tema-pct-badge" style="background:' + t.bg + ';color:' + t.cor + '">' + t.prob + '</div>';
    html += '<div style="flex:1;min-width:0"><div class="tema-label">' + t.label + '</div>';
    html += '<div class="tema-bar-wrap"><div class="tema-bar" style="background:' + t.cor + ';width:' + t.prob + '%"></div></div></div>';
    html += '<div class="tema-nivel" style="color:' + t.cor + '">' + (t.prob >= 80 ? 'ALTA' : (t.prob >= 60 ? 'MEDIA' : 'RELEV.')) + '</div>';
    html += '</div>';
  }
  html += '<div style="margin-top:12px;padding:10px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:11px;color:#92400e;line-height:1.55"><strong>Metodologia:</strong> frequencia como tema central nas provas + peso nos espelhos de correcao + presenca na bibliografia obrigatoria 2027.</div>';
  document.getElementById("main-content").innerHTML = html;
}

// ─── EVENTOS ─────────────────────────────────────────────────────────────────
function switchTab(tab) {
  tabAtiva = tab;
  var tabs = ['roteiro','semanas','relatorio','temas'];
  for (var i = 0; i < tabs.length; i++) {
    var btn = document.getElementById('btn-' + tabs[i]);
    if (btn) btn.className = 'nav-btn' + (tabs[i] === tab ? ' active' : '');
  }
  render();
}

function setDia(id) {
  diaAtivo = id;
  var d = getDia(id);
  semAtiva = d ? d.sem : 1;
  render();
}

function setSem(s) {
  semAtiva = s;
  var dias = getDiasSem(s);
  if (dias.length > 0) diaAtivo = dias[0].id;
  render();
}

function setSemRel(s) {
  semRel = s;
  renderRelatorio();
}

function goToDay(id) {
  diaAtivo = id;
  var d = getDia(id);
  semAtiva = d ? d.sem : 1;
  tabAtiva = 'roteiro';
  switchTab('roteiro');
}

function toggleTask(diaId, idx) {
  if (!progresso[diaId]) {
    var dia = getDia(diaId);
    progresso[diaId] = [];
    for (var i = 0; i < dia.tarefas.length; i++) progresso[diaId].push(false);
  }
  progresso[diaId][idx] = !progresso[diaId][idx];
  saveProg();
  render();
}

function render() {
  if (tabAtiva === 'roteiro') renderRoteiro();
  else if (tabAtiva === 'semanas') renderSemanas();
  else if (tabAtiva === 'relatorio') renderRelatorio();
  else if (tabAtiva === 'temas') renderTemas();
  updateHeader();
}

// ─── START ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
