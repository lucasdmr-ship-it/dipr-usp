<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">

<title>Roteiro DIPr USP 2026</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --navy:#1e3a5f;--navy2:#2d5f8a;--green:#059669;--amber:#d97706;--red:#b91c1c;
  --blue:#0369a1;--border:#e2e8f0;--bg:#f8fafc;--text:#1f2937;--muted:#6b7280;
  --radius:12px;--safe-bottom:env(safe-area-inset-bottom,0px)
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f1f5f9;color:var(--text);min-height:100vh;padding-bottom:calc(72px + var(--safe-bottom));font-size:15px}
.header{background:linear-gradient(160deg,#1e3a5f 0%,#2d5f8a 100%);color:#fff;padding:52px 20px 20px}
.header-eyebrow{font-size:10px;letter-spacing:2px;text-transform:uppercase;opacity:.65;margin-bottom:4px}
.header-title{font-size:22px;font-weight:700}
.header-sub{font-size:12px;opacity:.75;margin-top:2px}
.progress-wrap{margin-top:16px}
.progress-meta{display:flex;justify-content:space-between;font-size:12px;opacity:.85;margin-bottom:5px}
.progress-bar-bg{background:rgba(255,255,255,.2);border-radius:6px;height:7px}
.progress-bar{background:#4ade80;border-radius:6px;height:7px;transition:width .4s}
.today-strip{background:#162d4a;color:#fff;padding:8px 20px;font-size:12px;display:flex;justify-content:space-between;align-items:center}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;padding-bottom:var(--safe-bottom);z-index:100}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;border:none;background:none;cursor:pointer;color:var(--muted);font-size:10px;gap:3px}
.nav-btn.active{color:var(--navy)}
.nav-icon{font-size:20px}
.main{padding:16px;max-width:600px;margin:0 auto}
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px}
.chip-row{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.chip{padding:5px 12px;border-radius:20px;font-size:12px;font-weight:500;border:1px solid var(--border);background:#fff;cursor:pointer;color:var(--text)}
.chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.scroll-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.scroll-row::-webkit-scrollbar{display:none}
.day-chip{padding:5px 10px;border-radius:8px;font-size:12px;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--text);white-space:nowrap;flex-shrink:0}
.day-chip.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.day-chip.done{background:#d1fae5;border-color:#6ee7b7}
.day-chip.partial{background:#fef3c7;border-color:#fcd34d}
.day-chip.overloaded{background:#fee2e2;border-color:#fca5a5}
.task-item{display:flex;align-items:flex-start;gap:12px;padding:12px;background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:8px;cursor:pointer;-webkit-user-select:none;user-select:none}
.task-item.done{background:#f0fdf4;border-color:#86efac}
.task-item.remaneged{background:#fefce8;border-color:#fde047;border-style:dashed}
.task-item:active{opacity:.85}
.task-check{width:24px;height:24px;border-radius:7px;border:2px solid #d1d5db;flex-shrink:0;display:flex;align-items:center;justify-content:center;margin-top:1px;font-size:13px;font-weight:700;color:#fff}
.task-check.checked{background:var(--green);border-color:var(--green)}
.task-body{flex:1;min-width:0}
.task-meta{display:flex;align-items:center;gap:6px;margin-bottom:4px;flex-wrap:wrap}
.task-badge{font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px;flex-shrink:0}
.task-num{width:22px;height:22px;border-radius:50%;background:var(--navy);color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px}
.task-num.remaneged-num{background:#ca8a04}
.task-min{font-size:11px;color:var(--muted)}
.task-text{font-size:13px;line-height:1.45;color:var(--text)}
.task-item.done .task-text{text-decoration:line-through;color:var(--muted)}
.task-origin{font-size:10px;color:#ca8a04;margin-top:2px}
.badge-aula{background:#ede9fe;color:#7c3aed}
.badge-leitura{background:#e0f2fe;color:#0369a1}
.badge-fichamento{background:#d1fae5;color:#065f46}
.badge-pratica{background:#fef3c7;color:#92400e}
.badge-simulado{background:#ffe4e6;color:#9f1239}
.badge-revisao{background:#f3f4f6;color:#374151}
.ordem-hint{background:#f0f9ff;border:1px solid #bae6fd;border-radius:8px;padding:10px 12px;margin-bottom:12px;font-size:12px;color:#0369a1;line-height:1.5}
.flex-note{margin-top:12px;padding:10px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:12px;color:#92400e;line-height:1.5}
.carga-bar{margin-top:10px;padding:8px 12px;border-radius:8px;font-size:12px;line-height:1.5}
.carga-normal{background:#f0fdf4;border:1px solid #86efac;color:#065f46}
.carga-alta{background:#fef3c7;border:1px solid #fcd34d;color:#92400e}
.carga-critica{background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c}
.dia-fase{font-size:10px;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.dia-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.dia-title{font-size:18px;font-weight:700;color:var(--navy)}
.dia-sub{font-size:12px;color:var(--muted);margin-top:2px}
.dia-pct{font-size:26px;font-weight:700;text-align:right}
.dia-pct-lbl{font-size:10px;color:var(--muted);text-align:right}
.tema-pills{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:12px}
.tema-pill{padding:3px 9px;border-radius:20px;font-size:10px;font-weight:600;background:#eff6ff;color:#1d4ed8;border:1px solid #bfdbfe}
.week-card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);padding:14px;margin-bottom:10px}
.week-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.week-label{font-size:14px;font-weight:700;color:var(--navy)}
.week-sub{font-size:11px;color:var(--muted);margin-top:1px}
.week-pct{font-size:16px;font-weight:700}
.bar{background:#e5e7eb;border-radius:5px;height:6px;margin-bottom:10px}
.bar-fill{border-radius:5px;height:6px}
.metric-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px}
.metric-card{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center}
.metric-val{font-size:20px;font-weight:700}
.metric-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.status-pill{padding:8px 12px;border-radius:8px;font-size:13px;font-weight:600;margin-bottom:12px}
.interp{padding:10px 12px;background:#eff6ff;border:1px solid #bfdbfe;border-radius:8px;font-size:12px;color:#1e3a5f;line-height:1.55}
.tema-row{display:flex;align-items:center;gap:10px;padding:10px 12px;background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:8px}
.tema-pct-badge{width:42px;height:42px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.tema-label{font-size:13px;font-weight:600;color:var(--text);flex:1;min-width:0;line-height:1.3}
.tema-nivel{font-size:10px;font-weight:700;flex-shrink:0}
.tema-bar-wrap{height:4px;background:#e5e7eb;border-radius:4px;margin-top:5px}
.tema-bar{height:4px;border-radius:4px}
.section-title{font-size:11px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}

/* MODAL DE REMANEJO */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#fff;border-radius:20px 20px 0 0;padding:24px 20px calc(24px + var(--safe-bottom));width:100%;max-width:600px;max-height:90vh;overflow-y:auto}
.modal-title{font-size:16px;font-weight:700;color:var(--navy);margin-bottom:6px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:16px;line-height:1.5}
.modal-option{display:flex;align-items:flex-start;gap:12px;padding:14px;border:1.5px solid var(--border);border-radius:12px;margin-bottom:10px;cursor:pointer;background:#fff}
.modal-option:active{background:#f8fafc}
.modal-option.selected{border-color:var(--navy);background:#eff6ff}
.modal-option-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.modal-option-title{font-size:13px;font-weight:700;color:var(--navy);margin-bottom:2px}
.modal-option-desc{font-size:12px;color:var(--muted);line-height:1.4}
.modal-task-list{background:#f8fafc;border-radius:8px;padding:10px 12px;margin-bottom:16px;font-size:12px;color:var(--text);max-height:160px;overflow-y:auto}
.modal-task-item{padding:4px 0;border-bottom:1px solid var(--border);display:flex;gap:8px;align-items:flex-start}
.modal-task-item:last-child{border-bottom:none}
.modal-btn-row{display:flex;gap:10px;margin-top:6px}
.modal-btn{flex:1;padding:13px;border-radius:10px;border:none;font-size:14px;font-weight:600;cursor:pointer}
.modal-btn-primary{background:var(--navy);color:#fff}
.modal-btn-secondary{background:#f1f5f9;color:var(--text)}
.modal-btn:active{opacity:.85}

/* BANNER DE ALERTA */
.alert-banner{padding:10px 14px;border-radius:10px;margin-bottom:12px;font-size:12px;line-height:1.5;display:flex;gap:10px;align-items:flex-start}
.alert-warning{background:#fef3c7;border:1px solid #fcd34d;color:#92400e}
.alert-danger{background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c}
.alert-info{background:#eff6ff;border:1px solid #bfdbfe;color:#1e3a5f}
.alert-icon{font-size:16px;flex-shrink:0;margin-top:1px}
</style>
</head>

// ─── ESTADO GLOBAL ────────────────────────────────────────────────────────────
var STORAGE_KEY = "dipr_v5";
var progresso = {};      // {diaId: [bool, bool, ...]}
var remanejos = {};      // {diaId: [{tarefaOrigem, tarefaData, ...}]}
var cargaExtra = {};     // {diaId: minutos_extras_adicionados}
var diaAtivo = 1;
var semAtiva = 1;
var tabAtiva = "roteiro";
var semRel = 1;
var modalOpcaoSel = null;
var modalDiaId = null;

function salvar() {
  store.set(STORAGE_KEY, JSON.stringify({prog: progresso, rem: remanejos, extra: cargaExtra}));
}

function carregar() {
  var raw = store.get(STORAGE_KEY);
  if (raw) {
    try {
      var d = JSON.parse(raw);
      progresso = d.prog || {};
      remanejos = d.rem || {};
      cargaExtra = d.extra || {};
      return;
    } catch(e) {}
  }
  progresso = {}; remanejos = {}; cargaExtra = {};
  for (var i = 0; i < ROTEIRO_BASE.length; i++) {
    var dia = ROTEIRO_BASE[i];
    progresso[dia.id] = dia.tarefas.map(function(){ return false; });
  }
}

function getDia(id) {
  for (var i = 0; i < ROTEIRO_BASE.length; i++) { if (ROTEIRO_BASE[i].id === id) return ROTEIRO_BASE[i]; }
  return ROTEIRO_BASE[0];
}

function getTarefasCompletasNoDia(diaId) {
  // tarefas originais + remanejos
  var base = getDia(diaId);
  var tAll = [];
  for (var i = 0; i < base.tarefas.length; i++) {
    tAll.push({ tar: base.tarefas[i], idx: i, origem: null });
  }
  if (remanejos[diaId]) {
    for (var j = 0; j < remanejos[diaId].length; j++) {
      var r = remanejos[diaId][j];
      tAll.push({ tar: r, idx: base.tarefas.length + j, origem: r.origemData });
    }
  }
  return tAll;
}

function getPctDia(diaId) {
  var all = getTarefasCompletasNoDia(diaId);
  if (!all.length) return 0;
  var arr = progresso[diaId] || [];
  var f = 0;
  for (var i = 0; i < arr.length; i++) { if (arr[i]) f++; }
  return Math.round((f / all.length) * 100);
}

function getStatusDia(diaId) {
  var p = getPctDia(diaId);
  if (p === 0) return "pendente";
  if (p === 100) return "done";
  return "partial";
}

function getCargaDia(diaId) {
  var base = getDia(diaId);
  var baseMin = base.tarefas.reduce(function(a,t){ return a+t.min; }, 0);
  var remMin = 0;
  if (remanejos[diaId]) {
    for (var i = 0; i < remanejos[diaId].length; i++) remMin += remanejos[diaId][i].min;
  }
  return baseMin + remMin;
}

function getLimiteDia(diaId) {
  var base = getDia(diaId);
  var lim = CARGA_BASE[base.tipo] || 180;
  if (cargaExtra[diaId]) lim += cargaExtra[diaId];
  return lim;
}

function getPctSem(s) {
  var total = 0, feitos = 0;
  for (var i = 0; i < ROTEIRO_BASE.length; i++) {
    var d = ROTEIRO_BASE[i];
    if (d.sem !== s) continue;
    var all = getTarefasCompletasNoDia(d.id);
    total += all.length;
    var arr = progresso[d.id] || [];
    for (var j = 0; j < arr.length; j++) { if (arr[j]) feitos++; }
  }
  return total ? Math.round((feitos / total) * 100) : 0;
}

function getTotalGeral() {
  var total = 0, feitos = 0;
  for (var i = 0; i < ROTEIRO_BASE.length; i++) {
    var d = ROTEIRO_BASE[i];
    var all = getTarefasCompletasNoDia(d.id);
    total += all.length;
    var arr = progresso[d.id] || [];
    for (var j = 0; j < arr.length; j++) { if (arr[j]) feitos++; }
  }
  return {total:total, feitos:feitos, pct: total ? Math.round((feitos/total)*100):0};
}

function getDiasSem(s) {
  var out = [];
  for (var i = 0; i < ROTEIRO_BASE.length; i++) { if (ROTEIRO_BASE[i].sem === s) out.push(ROTEIRO_BASE[i]); }
  return out;
}

function getPendentesNoDia(diaId) {
  var base = getDia(diaId);
  var arr = progresso[diaId] || [];
  var pendentes = [];
  for (var i = 0; i < base.tarefas.length; i++) {
    if (!arr[i] && !base.tarefas[i].sim) {
      pendentes.push(base.tarefas[i]);
    }
  }
  return pendentes;
}

function diasFuturos(diaId) {
  var out = [];
  for (var i = 0; i < ROTEIRO_BASE.length; i++) {
    if (ROTEIRO_BASE[i].id > diaId && ROTEIRO_BASE[i].id <= 41) out.push(ROTEIRO_BASE[i]);
  }
  return out;
}

function proximoFDS(diaId) {
  var futuros = diasFuturos(diaId);
  for (var i = 0; i < futuros.length; i++) {
    if (futuros[i].tipo === "fds") return futuros[i];
  }
  return null;
}

// ─── REMANEJO ────────────────────────────────────────────────────────────────
function verificarRemanejo(diaId) {
  var hoje = new Date();
  var inicio = new Date("2026-06-23");
  var diaNum = Math.floor((hoje - inicio) / 86400000) + 1;
  // so verificar dias passados
  if (diaId >= diaNum) return false;
  var pendentes = getPendentesNoDia(diaId);
  return pendentes.length > 0;
}

function abrirModal(diaId) {
  var pendentes = getPendentesNoDia(diaId);
  if (!pendentes.length) return;

  modalDiaId = diaId;
  modalOpcaoSel = null;

  var base = getDia(diaId);
  document.getElementById("modal-title").textContent = "Tarefas nao concluidas — " + base.data;
  document.getElementById("modal-sub").textContent = pendentes.length + " tarefa(s) nao feita(s). Escolha como deseja remaneja-las:";

  // Lista de tarefas pendentes
  var listHtml = "";
  for (var i = 0; i < pendentes.length; i++) {
    var t = pendentes[i];
    var tc = TIPO[t.tipo] || TIPO.revisao;
    listHtml += '<div class="modal-task-item"><span class="task-badge ' + tc.cls + '" style="flex-shrink:0">' + tc.label + '</span><span>' + t.t + ' (' + t.min + 'min)</span></div>';
  }
  document.getElementById("modal-task-list").innerHTML = listHtml;

  // Calcular opcoes
  var proxDia = null;
  var fds = proximoFDS(diaId);
  var futuros = diasFuturos(diaId);
  if (futuros.length > 0) proxDia = futuros[0];

  var totalPendMin = pendentes.reduce(function(a,t){ return a+t.min; }, 0);

  var opcoes = "";

  // Opcao 1: dia seguinte
  if (proxDia) {
    var cargaProx = getCargaDia(proxDia.id);
    var limProx = getLimiteDia(proxDia.id);
    var novaProx = cargaProx + totalPendMin;
    var aviso = novaProx > limProx ? " (requer extensao de " + (novaProx-limProx) + "min)" : " (cabe no limite atual)";
    opcoes += '<div class="modal-option" id="op1" onclick="selOpcao(1)"><div class="modal-option-icon">➡️</div><div><div class="modal-option-title">Dia seguinte (' + proxDia.data + ')</div><div class="modal-option-desc">Adicionar ao inicio de amanha com prioridade.' + aviso + '</div></div></div>';
  }

  // Opcao 2: proximo FDS
  if (fds && fds.id !== (proxDia ? proxDia.id : -1)) {
    var cargaFds = getCargaDia(fds.id);
    var limFds = getLimiteDia(fds.id);
    var novaFds = cargaFds + totalPendMin;
    var avisoFds = novaFds > limFds ? " (requer extensao de " + (novaFds-limFds) + "min)" : " (cabe no limite atual)";
    opcoes += '<div class="modal-option" id="op2" onclick="selOpcao(2)"><div class="modal-option-icon">📅</div><div><div class="modal-option-title">Proximo fim de semana (' + fds.data + ')</div><div class="modal-option-desc">Aproveitar o tempo extra do FDS.' + avisoFds + '</div></div></div>';
  }

  // Opcao 3: distribuir ao longo da semana
  if (futuros.length >= 2) {
    var diasSemana = [];
    for (var k = 0; k < futuros.length && diasSemana.length < 4; k++) {
      if (futuros[k].tipo === "util") diasSemana.push(futuros[k]);
    }
    if (diasSemana.length >= 2) {
      opcoes += '<div class="modal-option" id="op3" onclick="selOpcao(3)"><div class="modal-option-icon">📊</div><div><div class="modal-option-title">Distribuir ao longo da semana</div><div class="modal-option-desc">Dividir as tarefas entre os proximos ' + diasSemana.length + ' dias uteis, adicionando ~' + Math.ceil(totalPendMin/diasSemana.length) + 'min por dia.</div></div></div>';
    }
  }

  if (!opcoes) {
    opcoes = '<div class="alert-banner alert-danger"><span class="alert-icon">⚠️</span><span>Nao ha dias uteis suficientes para remanejo. As tarefas serao descartadas ou devem ser incorporadas manualmente.</span></div>';
    document.getElementById("modal-confirmar").style.display = "none";
  } else {
    document.getElementById("modal-confirmar").style.display = "";
  }

  document.getElementById("modal-opcoes").innerHTML = opcoes;
  document.getElementById("modal").style.display = "flex";
}

function selOpcao(n) {
  modalOpcaoSel = n;
  for (var i = 1; i <= 3; i++) {
    var el = document.getElementById("op" + i);
    if (el) el.className = "modal-option" + (i === n ? " selected" : "");
  }
}

function fecharModal() {
  document.getElementById("modal").style.display = "none";
  modalDiaId = null; modalOpcaoSel = null;
}

function fecharModalFora(e) {
  if (e.target === document.getElementById("modal")) fecharModal();
}

function confirmarRemanejo() {
  if (!modalDiaId || !modalOpcaoSel) { alert("Selecione uma opcao de remanejo."); return; }

  var pendentes = getPendentesNoDia(modalDiaId);
  if (!pendentes.length) { fecharModal(); return; }

  var base = getDia(modalDiaId);
  var futuros = diasFuturos(modalDiaId);
  var fds = proximoFDS(modalDiaId);

  if (modalOpcaoSel === 1) {
    // Dia seguinte
    var proxDia = futuros.length ? futuros[0] : null;
    if (proxDia) remanejarPara(pendentes, proxDia.id, base.data);
  } else if (modalOpcaoSel === 2) {
    // FDS
    if (fds) remanejarPara(pendentes, fds.id, base.data);
  } else if (modalOpcaoSel === 3) {
    // Distribuir
    var diasUtil = [];
    for (var k = 0; k < futuros.length && diasUtil.length < 4; k++) {
      if (futuros[k].tipo === "util") diasUtil.push(futuros[k]);
    }
    var por = Math.ceil(pendentes.length / Math.max(diasUtil.length, 1));
    var idx = 0;
    for (var d = 0; d < diasUtil.length && idx < pendentes.length; d++) {
      var lote = pendentes.slice(idx, idx + por);
      remanejarPara(lote, diasUtil[d].id, base.data);
      idx += por;
    }
  }

  fecharModal();
  render();
  updateStrip();
}

function remanejarPara(tarefas, destDiaId, origemData) {
  if (!remanejos[destDiaId]) remanejos[destDiaId] = [];
  var cargaAtual = getCargaDia(destDiaId);
  var limAtual = getLimiteDia(destDiaId);
  var totalNovo = tarefas.reduce(function(a,t){ return a+t.min; }, 0);
  // Estender se necessario
  if (cargaAtual + totalNovo > limAtual) {
    var extra = (cargaAtual + totalNovo) - limAtual;
    cargaExtra[destDiaId] = (cargaExtra[destDiaId] || 0) + extra;
  }
  for (var i = 0; i < tarefas.length; i++) {
    var t = Object.assign ? Object.assign({}, tarefas[i]) : JSON.parse(JSON.stringify(tarefas[i]));
    t.origemData = origemData;
    remanejos[destDiaId].push(t);
    // registrar slot no progresso
    if (!progresso[destDiaId]) progresso[destDiaId] = [];
    progresso[destDiaId].push(false);
  }
  salvar();
}

    html+='<div style="flex:1;min-width:0"><div class="tema-label">'+t.label+'</div>';
    html+='<div class="tema-bar-wrap"><div class="tema-bar" style="background:'+t.cor+';width:'+t.prob+'%"></div></div></div>';
    html+='<div class="tema-nivel" style="color:'+t.cor+'">'+(t.prob>=80?'ALTA':(t.prob>=60?'MEDIA':'RELEV.'))+'</div></div>';
  }
  html+='<div style="margin-top:12px;padding:10px 12px;background:#fffbeb;border:1px solid #fde68a;border-radius:8px;font-size:11px;color:#92400e;line-height:1.55"><strong>Metodologia:</strong> frequencia como tema central + peso nos espelhos de correcao + presenca na bibliografia obrigatoria 2027.</div>';
  document.getElementById("main-content").innerHTML = html;
}

// ─── EVENTOS ─────────────────────────────────────────────────────────────────
function switchTab(tab){
  tabAtiva=tab;
  var tabs=['roteiro','semanas','relatorio','temas'];
  for(var i=0;i<tabs.length;i++){
    var b=document.getElementById('btn-'+tabs[i]);
    if(b) b.className='nav-btn'+(tabs[i]===tab?' active':'');
  }
  render();
}
function setDia(id){diaAtivo=id;var d=getDia(id);semAtiva=d?d.sem:1;render();}
function setSem(s){semAtiva=s;var dias=getDiasSem(s);if(dias.length)diaAtivo=dias[0].id;render();}
function setSemRel(s){semRel=s;renderRelatorio();}
function goToDay(id){diaAtivo=id;var d=getDia(id);semAtiva=d?d.sem:1;tabAtiva='roteiro';switchTab('roteiro');}
function toggleTask(diaId,idx){
  if(!progresso[diaId]){
    var dia=getDia(diaId);
    progresso[diaId]=dia.tarefas.map(function(){return false;});
  }
  while(progresso[diaId].length<=idx) progresso[diaId].push(false);
  progresso[diaId][idx]=!progresso[diaId][idx];
  salvar();
  render();
}
function render(){
  if(tabAtiva==='roteiro') renderRoteiro();
  else if(tabAtiva==='semanas') renderSemanas();
  else if(tabAtiva==='relatorio') renderRelatorio();
  else if(tabAtiva==='temas') renderTemas();
  updateHeader();
}

// ─── START ────────────────────────────────────────────────────────────────────
render();
</script>
</body>
</html>
